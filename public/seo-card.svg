<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Time Tracker social preview card</title>
  <desc id="desc">Promotional card for Time Tracker with a concise value proposition about time tracking, statistics and calendar view.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#e5f0ff" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#137fec" />
      <stop offset="100%" stop-color="#0d63b9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#137fec" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1200" height="630" rx="40" fill="url(#bg)" />
  <circle cx="1040" cy="110" r="140" fill="#137fec" opacity="0.07" />
  <circle cx="1020" cy="530" r="170" fill="#137fec" opacity="0.06" />
  <circle cx="140" cy="120" r="100" fill="#137fec" opacity="0.05" />

  <g filter="url(#shadow)">
    <rect x="710" y="90" width="360" height="450" rx="34" fill="#ffffff" />
    <rect x="740" y="130" width="300" height="42" rx="18" fill="#f1f5f9" />
    <rect x="740" y="205" width="136" height="110" rx="26" fill="url(#accent)" />
    <rect x="904" y="205" width="136" height="110" rx="26" fill="#8b5cf6" />
    <rect x="740" y="344" width="300" height="118" rx="28" fill="#f8fafc" />
    <rect x="760" y="378" width="170" height="12" rx="6" fill="#cbd5e1" />
    <rect x="760" y="408" width="212" height="12" rx="6" fill="#dbeafe" />
    <rect x="740" y="485" width="300" height="25" rx="12" fill="#dbeafe" />
  </g>

  <g fill="#0f172a">
    <text x="96" y="170" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700" letter-spacing="1.5">
      TIME TRACKER
    </text>
    <text x="96" y="270" font-size="72" font-family="Inter, Arial, sans-serif" font-weight="900">
      Track time with
    </text>
    <text x="96" y="350" font-size="72" font-family="Inter, Arial, sans-serif" font-weight="900" fill="#137fec">
      clarity.
    </text>
    <text x="96" y="420" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="500" fill="#334155">
      Log hours, review a calendar view, and check useful stats.
    </text>
    <text x="96" y="465" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="500" fill="#334155">
      Built for freelancers, students, and focused personal projects.
    </text>
  </g>

  <g transform="translate(96 520)">
    <rect width="300" height="56" rx="28" fill="url(#accent)" />
    <text x="150" y="36" text-anchor="middle" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="800" fill="#ffffff">
      Free time tracking app
    </text>
  </g>
</svg>
