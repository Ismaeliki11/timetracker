  <style>
    body {
      font-family: 'Inter', sans-serif;
      overscroll-behavior-y: none;
      touch-action: manipulation;
      margin: 0;
      padding: 0;
      background-color: transparent;
    }

    .scrollable-content {
      -webkit-overflow-scrolling: touch;
    }

    #professional-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-color: #f0f2f5;
      background-image: radial-gradient(circle at top left, #ffffff, #e9ecef);
      transition: background 0.5s ease;
    }

    .dark #professional-bg {
      background-color: #121212;
      background-image: radial-gradient(circle at top left, #1a1a1a, #000000);
    }

    .material-symbols-outlined {
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.3);
    }

    .dark ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .glass-pane {
      background-color: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 12px 0 rgba(0, 0, 0, 0.05);
    }

    .glass-interactive {
      background-color: #f3f4f6;
      border: 1px solid transparent;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .glass-interactive:hover {
      background-color: #e5e7eb;
      transform: translateY(-1px);
    }

    .dark .glass-pane {
      background-color: rgba(20, 22, 25, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    }

    .dark .glass-interactive {
      background-color: rgba(42, 45, 49, 0.7);
      border: 1px solid transparent;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .dark .glass-interactive:hover {
      background-color: rgba(55, 58, 64, 0.8);
      transform: translateY(-1px);
    }

    input[type="time"],
    input[type="date"] {
      -webkit-appearance: none;
      appearance: none;
      min-height: 3.5rem;
      background-color: #f1f5f9;
      color: #0f172a;
      border-radius: 0.5rem;
      padding: 0 1rem;
    }

    .dark input[type="time"],
    .dark input[type="date"] {
      background-color: #1e293b;
      color: #f8fafc;
      color-scheme: dark;
    }

    input[type="time"] {
      text-align: center;
    }
